<!DOCTYPE html>
<html lang="bn" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="description" content="AnnotaPDF — বাংলা PDF ও ইমেজ হাইলাইটার।">
  <meta name="theme-color" content="#1a73e8">
  <title>AnnotaPDF</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/icons.css">
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div id="load-bar"></div>
<div id="toast" role="status" aria-live="polite"></div>
<input type="file" id="file-input" accept="application/pdf,image/*" multiple>

<header id="header">
  <div class="hdr-left">
    <button class="hdr-icon-btn" id="sidebar-toggle" title="থাম্বনেইল প্যানেল">
      <i class="fa-solid fa-bars"></i>
    </button>
    <a class="logo" href="#">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="#1a73e8" opacity=".18"/>
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8L14 2z" stroke="#1a73e8" stroke-width="1.5" fill="none"/>
        <path d="M14 2v6h6" stroke="#1a73e8" stroke-width="1.5" fill="none"/>
        <rect x="7" y="13" width="5" height="2" rx="1" fill="#FBBC04"/>
        <rect x="7" y="16" width="8" height="2" rx="1" fill="#FBBC04" opacity=".6"/>
      </svg>
      <span>AnnotaPDF</span>
    </a>
  </div>

  <div class="hdr-center" id="tab-bar">
    <button class="tab-add" id="add-tab-btn" title="নতুন ফাইল">
      <i class="fa-solid fa-plus"></i>
    </button>
  </div>

  <div class="hdr-right">
    <div class="url-wrap">
      <i class="fa-solid fa-link url-icon"></i>
      <input type="url" id="header-url-input" placeholder="PDF বা ছবির URL..." autocomplete="off" spellcheck="false">
      <button id="url-load-btn" class="url-go-btn" title="লোড করুন">
        <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>
    <button class="hdr-icon-btn" id="header-file-btn" title="ফাইল খুলুন (Ctrl+O)">
      <i class="fa-solid fa-folder-open"></i>
    </button>
    <button class="hdr-icon-btn hdr-save-btn" id="save-btn" title="সেভ করুন (Ctrl+S)">
      <i class="fa-solid fa-floppy-disk"></i>
    </button>
  </div>
</header>

<div id="app-shell">

  <aside id="thumb-sidebar" class="open">
    <div id="thumb-list">
      <div class="thumb-empty" id="thumb-empty">
        <i class="fa-solid fa-file-pdf"></i>
        <span>ফাইল খুলুন</span>
      </div>
    </div>
  </aside>

  <div id="main-view">

    <div id="toolbar">
      <div class="tool-group">
        <button class="tool-btn active" data-mode="highlight" title="হাইলাইট (H)">
          <i class="fa-solid fa-highlighter"></i>
          <span class="tool-label">হাইলাইট</span>
        </button>
        <button class="tool-btn" data-mode="erase" title="ইরেজ (E)">
          <i class="fa-solid fa-eraser"></i>
          <span class="tool-label">ইরেজ</span>
        </button>
        <button class="tool-btn" data-mode="pan" title="প্যান (V)">
          <i class="fa-solid fa-hand"></i>
          <span class="tool-label">প্যান</span>
        </button>
      </div>

      <div class="tool-div"></div>

      <div class="tool-group color-group" id="color-group">
        <div class="swatch active" data-color="yellow"  style="background:#FFC107" title="হলুদ"></div>
        <div class="swatch" data-color="green"   style="background:#34A853" title="সবুজ"></div>
        <div class="swatch" data-color="blue"    style="background:#4285F4" title="নীল"></div>
        <div class="swatch" data-color="red"     style="background:#EA4335" title="লাল"></div>
        <div class="swatch" data-color="pink"    style="background:#FF69B4" title="গোলাপী"></div>
        <div class="swatch" data-color="orange"  style="background:#FF922B" title="কমলা"></div>
        <div class="swatch" data-color="purple"  style="background:#9775FA" title="বেগুনি"></div>
        <div class="swatch" data-color="cyan"    style="background:#22D3EE" title="সায়ান"></div>
        <div class="swatch custom-swatch" data-color="custom" title="কাস্টম রঙ">
          <input type="color" id="custom-color" value="#FFC107">
        </div>
      </div>

      <div class="tool-div"></div>

      <div class="tool-group opacity-group">
        <i class="fa-solid fa-droplet op-icon"></i>
        <input type="range" id="op-slider" min="10" max="100" value="60" title="অপাসিটি">
        <span id="op-val">60%</span>
      </div>

      <div class="tool-div"></div>

      <div class="tool-group">
        <button class="tool-btn sm" id="zoom-out" title="জুম আউট (Ctrl+-)">
          <i class="fa-solid fa-minus"></i>
        </button>
        <button class="zoom-label" id="zoom-label" title="ফিট করুন">100%</button>
        <button class="tool-btn sm" id="zoom-in" title="জুম ইন (Ctrl++)">
          <i class="fa-solid fa-plus"></i>
        </button>
      </div>

      <div class="tool-div"></div>

      <div class="tool-group">
        <button class="tool-btn sm" id="undo-btn" title="আনডু (Ctrl+Z)">
          <i class="fa-solid fa-rotate-left"></i>
        </button>
        <button class="tool-btn sm" id="redo-btn" title="রিডু (Ctrl+Y)">
          <i class="fa-solid fa-rotate-right"></i>
        </button>
      </div>

      <div class="tool-div"></div>

      <button class="tool-btn sm danger" id="clear-page-btn" title="এই পেজ মুছুন">
        <i class="fa-solid fa-trash-can"></i>
      </button>
    </div>

    <div id="pdf-viewer">

      <div id="drop-zone">
        <div class="dz-inner">
          <div class="dz-icon">
            <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
              <rect x="10" y="6" width="44" height="58" rx="5" fill="#E8F0FE"/>
              <path d="M44 6v14h10" stroke="#4285F4" stroke-width="1.8" fill="none"/>
              <rect x="10" y="6" width="44" height="58" rx="5" stroke="#4285F4" stroke-width="1.5" fill="none"/>
              <rect x="18" y="34" width="14" height="5" rx="2.5" fill="#FBBC04"/>
              <rect x="18" y="42" width="24" height="5" rx="2.5" fill="#FBBC04" opacity=".6"/>
              <rect x="18" y="50" width="18" height="5" rx="2.5" fill="#FBBC04" opacity=".35"/>
            </svg>
          </div>
          <h2>PDF বা ছবি খুলুন</h2>
          <p>ফাইল এখানে টেনে আনুন অথবা বাটনে ক্লিক করুন</p>
          <div class="dz-btns">
            <button class="dz-btn primary" id="dz-file-btn">
              <i class="fa-solid fa-folder-open"></i> ফাইল বেছে নিন
            </button>
          </div>
          <div class="dz-url-row">
            <i class="fa-solid fa-link"></i>
            <input type="url" id="dz-url-input" placeholder="অথবা PDF / ছবির URL পেস্ট করুন..." autocomplete="off" spellcheck="false">
            <button id="dz-url-btn">লোড</button>
          </div>
          <p class="dz-note"><i class="fa-solid fa-shield-halved"></i> ফাইল শুধু আপনার ব্রাউজারে — সার্ভারে যায় না</p>
        </div>
      </div>

      <div id="pages-container" class="hidden"></div>

    </div>

  </div>

  <aside id="hi-panel">
    <div class="hip-header">
      <span><i class="fa-solid fa-highlighter"></i> হাইলাইট</span>
      <span class="hi-count-badge" id="hi-count">0</span>
    </div>
    <div id="hi-list">
      <div class="hi-empty" id="hi-empty">
        <i class="fa-solid fa-highlighter"></i>
        <p>হাইলাইট নেই।<br>ড্র্যাগ করে আঁকুন।</p>
      </div>
    </div>
  </aside>

</div>

<nav id="mobile-bar">
  <button class="mb-btn" id="mb-file">
    <i class="fa-solid fa-folder-open"></i><span>ফাইল</span>
  </button>
  <button class="mb-btn active" id="mb-mode">
    <i class="fa-solid fa-highlighter"></i><span>হাইলাইট</span>
  </button>
  <button class="mb-btn" id="mb-color">
    <i class="fa-solid fa-palette"></i><span>রঙ</span>
  </button>
  <button class="mb-btn" id="mb-save">
    <i class="fa-solid fa-floppy-disk"></i><span>সেভ</span>
  </button>
  <button class="mb-btn" id="mb-hi">
    <i class="fa-solid fa-list"></i><span>তালিকা</span>
  </button>
</nav>

<div id="color-modal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <span>রঙ বেছে নিন</span>
      <button id="close-color-modal"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="mob-color-grid" id="mob-color-grid"></div>
  </div>
</div>

<div id="hi-modal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <span><i class="fa-solid fa-highlighter"></i> হাইলাইট তালিকা</span>
      <button id="close-hi-modal"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="mob-hi-list"></div>
  </div>
</div>

<script>
  window.addEventListener('load', () => {
    const s = document.createElement('script');
    s.src = 'js/app.js';
    document.body.appendChild(s);
  });
</script>
</body>
</html>
